<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="admin-common.css">
  <title>Programs Admin – Track progress of kadets</title>
  <style>
    /* Page-specific: this page's filter dropdown hides the native chevron */
    .filter-dropdown {
      appearance: none;
      background-image: none;
      padding-right: 12px;
    }

    .participant-email {
      font-size: 13px;
      color: #6e6e73;
    }

    /* Attendance column(s) — shape depends on the configured program
       duration (see .config-radio[name="duration"] in the modal below). */
    .attendance-th,
    .attendance-td {
      text-align: left;
      min-width: 140px;
    }

    .attendance-day-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .attendance-day-row-label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
    }

    .attendance-th-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-weight: 600;
      color: #6e6e73;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }

    /* Connected segmented button group — one button per event day, all
       sharing one border line via negative margin overlap. Only the two
       end buttons get outer corner rounding. */
    .attendance-day-group {
      display: inline-flex;
    }

    .attendance-day-btn {
      padding: 6px 10px;
      min-width: 32px;
      border: 1px solid #d2d2d7;
      background: white;
      color: #1d1d1f;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .attendance-day-btn + .attendance-day-btn {
      margin-left: -1px;
    }

    .attendance-day-group .attendance-day-btn:first-child {
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
    }

    .attendance-day-group .attendance-day-btn:last-child {
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    .attendance-day-btn {
      position: relative;
    }

    .attendance-day-btn:hover {
      background: #f5f5f7;
      z-index: 1;
    }

    .attendance-day-btn.filled {
      background: #10b981;
      color: white;
      border-color: #10b981;
      z-index: 1;
    }

    .attendance-day-btn.filled:hover {
      background: #0ea472;
    }

    /* Custom global tooltip styled similarly to standard tooltips,
       rendered at body level to escape overflow clipping in scrollable body. */
    .custom-tooltip {
      position: fixed;
      padding: 5px 9px;
      background: #1d1d1f;
      color: white;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      border-radius: 4px;
      z-index: 100000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    .custom-tooltip.show {
      opacity: 1;
    }

    /* Submissions column — same connected-button pattern as Attendance,
       but orange, and each button represents a task rather than a day. */
    .submission-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .submission-row-label {
      font-size: 13px;
      font-weight: 600;
      color: #6e6e73;
    }

    .submission-group {
      display: inline-flex;
    }

    .submission-btn {
      padding: 6px 10px;
      min-width: 32px;
      border: 1px solid #d2d2d7;
      background: white;
      color: #1d1d1f;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }

    .submission-btn + .submission-btn {
      margin-left: -1px;
    }

    .submission-group .submission-btn:first-child {
      border-top-left-radius: 6px;
      border-bottom-left-radius: 6px;
    }

    .submission-group .submission-btn:last-child {
      border-top-right-radius: 6px;
      border-bottom-right-radius: 6px;
    }

    .submission-btn:hover {
      background: #f5f5f7;
      z-index: 1;
    }

    .submission-btn.filled {
      background: #f59e0b;
      color: white;
      border-color: #f59e0b;
      z-index: 1;
    }

    .submission-btn.filled:hover {
      background: #d97706;
    }

    /* Helper tooltips on the status pill + its dropdown options, explaining
       what each status means. Options get a side tooltip (they're stacked
       vertically, so "above" would collide with neighboring rows); the
       pill itself keeps the default "above" placement, but is suppressed
       while its own dropdown is open to avoid a double tooltip. */
    .status-option {
      position: relative;
    }



    .config-days-field {
      margin-top: 12px;
    }

    .config-days-input {
      padding: 8px 12px;
      border: 1px solid #d2d2d7;
      border-radius: 6px;
      font-size: 14px;
      width: 80px;
    }

    /* Checkbox styling (row bulk-selection) */
    .checkbox {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #0066cc;
    }

    .select-col {
      width: 40px;
    }

    /* Page shell: the page itself doesn't scroll — only the table's row
       body does. Header/controls above the table and the footer below it
       stay fixed on screen; .table-scroll is the one scrollable region. */
    body {
      height: 100vh;
      overflow: hidden;
    }

    .container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .page-header,
    .controls {
      flex-shrink: 0;
    }

    .table-wrapper {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .table-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
    }

    /* Header lives in its own table, outside .table-scroll entirely, so
       the scrollbar only ever spans the row body — not the header. Widths
       are synced to the body table's actual columns via JS (see
       syncHeaderWidths), since the header table has no data of its own to
       size against. */
    .table-head-table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      flex-shrink: 0;
      background: #f5f5f7;
      position: relative;
      z-index: 5;
    }

    .scrollbar-spacer {
      padding: 0;
      border: none;
    }

    .table-footer {
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      border-top: 1px solid #e5e7eb;
      background: #fafafa;
      font-size: 13px;
      color: #6e6e73;
      position: relative;
      z-index: 1;
    }

    .footer-selected-count {
      color: #0066cc;
      font-weight: 600;
    }



    /* Selected-row highlight */
    #signups-table tbody tr:has(.row-select:checked) {
      background: #eff6ff;
    }

    /* Whole-row click selects it — except the Name/email column, which
       needs normal text selection (e.g. double-click to copy). */
    #signups-table tbody tr {
      cursor: pointer;
    }

    #signups-table tbody .participant-cell {
      cursor: auto;
    }

    .created-at-cell,
    .updated-at-cell {
      white-space: nowrap;
      color: #6e6e73;
      font-size: 13px;
      line-height: 1.4;
    }
    .time-part {
      color: #86868b;
      font-size: 12px;
    }

    tr.hidden {
      display: none !important;
    }
  </style>
</head>
<body>

<!-- Main Content -->
<div class="container">
  <div class="page-header">
    <div class="page-header-content">
      <h1 class="page-title">Programs Admin</h1>
      <p class="page-subtitle">Track the progress of kadets for the program {program_name}</p>
    </div>
    <button class="config-btn" onclick="openModal('configModal')" title="Program settings">⚙️</button>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="filter-section">
      <span class="filter-label">Filter by Status:</span>
      <select class="filter-dropdown" id="statusFilter">
        <option value="all">All signups</option>
        <option value="completed">Completed</option>
        <option value="registered">Registered</option>
        <option value="interested">Interested</option>
        <option value="dropped-out">Dropped out</option>
      </select>
    </div>
    <div class="action-buttons">
      <button class="btn-outline" onclick="importCSV()">↓ Import CSV</button>
      <button class="btn-outline" onclick="exportCSV()">↑ Export CSV</button>
    </div>
  </div>

  <!-- Signups Table -->
  <div class="table-wrapper">
  <table id="tableHead" class="table-head-table">
    <thead>
      <tr id="headRow">
        <th class="select-col"><input type="checkbox" class="checkbox" id="selectAllRows"></th>
        <th>Name</th>
        <th>Status</th>
        <th class="created-at-th">Created At</th>
        <th class="updated-at-th">Updated At</th>
        <th class="scrollbar-spacer" id="scrollbarSpacer"></th>
      </tr>
    </thead>
  </table>
  <div class="table-scroll">
  <table id="signups-table">
    <tbody>
    </tbody>
  </table>
  </div>
  <div class="table-footer" id="tableFooter">
    <span id="footerText">10 rows</span>
  </div>
  </div>
</div>

<!-- Config Modal -->
<div id="configModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Program Configuration</h2>
      <button class="modal-close" onclick="closeModal('configModal')">✕</button>
    </div>

    <div class="config-group">
      <label class="config-label">Duration</label>
      <div class="config-options">
        <input type="radio" id="duration-single" name="duration" class="config-radio" value="single-day">
        <label for="duration-single" class="config-radio-label">Single-day</label>

        <input type="radio" id="duration-multi" name="duration" class="config-radio" value="multi-day" checked>
        <label for="duration-multi" class="config-radio-label">Multi-day</label>

        <input type="radio" id="duration-none" name="duration" class="config-radio" value="no-attendance">
        <label for="duration-none" class="config-radio-label">No attendance</label>
      </div>
      <div class="config-days-field" id="configDaysField" style="display: block;">
        <label class="config-label" for="configDaysCount">Number of days</label>
        <input type="number" id="configDaysCount" class="config-days-input" min="2" max="31" value="7">
      </div>
    </div>

    <div class="config-group">
      <label class="config-label">Deliverables</label>
      <div class="config-options">
        <input type="radio" id="submissions-yes" name="submissions" class="config-radio" value="has-submissions" checked>
        <label for="submissions-yes" class="config-radio-label">Has submissions</label>

        <input type="radio" id="submissions-no" name="submissions" class="config-radio" value="no-submissions">
        <label for="submissions-no" class="config-radio-label">No submissions</label>
      </div>
      <div class="config-days-field" id="configSubmissionsField" style="display: block;">
        <label class="config-label" for="configSubmissionsCount">Number of submissions</label>
        <input type="number" id="configSubmissionsCount" class="config-days-input" min="1" max="20" value="3">
      </div>
    </div>
    
    <div class="config-group">
      <label class="config-label">Format</label>
      <div class="config-options">
        <input type="radio" id="format-online" name="format" class="config-radio" value="online" checked>
        <label for="format-online" class="config-radio-label">Online</label>

        <input type="radio" id="format-onsite" name="format" class="config-radio" value="onsite">
        <label for="format-onsite" class="config-radio-label">Onsite</label>

        <input type="radio" id="format-hybrid" name="format" class="config-radio" value="hybrid">
        <label for="format-hybrid" class="config-radio-label">Hybrid</label>
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeModal('configModal')">Cancel</button>
      <button class="modal-btn save" onclick="saveConfig()">Save</button>
    </div>
  </div>
</div>

<script src="admin-signups-program-data.js"></script>
<script>
  // Render rows synchronously before admin-common.js loads
  const tbody = document.querySelector('#signups-table tbody');
  tbody.innerHTML = participantsData.map(p => `
      <tr data-row-id="${p.id}" data-status="${p.status}">
        <td><input type="checkbox" class="checkbox row-select"></td>
        <td>
          <div class="participant-cell">
            <div><span class="participant-name">${p.name}</span></div>
            <div><span class="participant-email">${p.email}</span></div>
          </div>
        </td>
        <td>
          <span class="status-pill editable" data-status="${p.status}" onclick="toggleStatusDropdown(event)">
            <span class="status-pill-label">${p.status === 'dropped-out' ? 'Dropped out' : p.status.charAt(0).toUpperCase() + p.status.slice(1)}</span>
            <div class="status-dropdown" data-statuses="completed,registered,interested,dropped-out">
              <div class="status-option" data-status="completed">Completed</div>
              <div class="status-option" data-status="registered">Registered</div>
              <div class="status-option" data-status="interested">Interested</div>
              <div class="status-option" data-status="dropped-out">Dropped out</div>
            </div>
          </span>
        </td>
        <td class="created-at-cell">
          <div>${p.createdAt.date}</div>
          <div class="time-part">${p.createdAt.time}</div>
        </td>
        <td class="updated-at-cell">
          <div>${p.updatedAt.date}</div>
          <div class="time-part">${p.updatedAt.time}</div>
        </td>
      </tr>
  `).join('');
</script>
<script src="admin-common.js"></script>
<script>
  function formatDateTimeHTML(date) {
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    const month = months[date.getMonth()];
    const day = date.getDate();
    const year = date.getFullYear();
    let hours = date.getHours();
    const minutes = String(date.getMinutes()).padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12; // the hour '0' should be '12'
    const hoursStr = String(hours).padStart(2, '0');
    return `<div>${month} ${day}, ${year}</div><div class="time-part">${hoursStr}:${minutes} ${ampm}</div>`;
  }

  function updateRowTimestamp(row) {
    if (!row) return;
    const updatedAtCell = row.querySelector('.updated-at-cell');
    if (updatedAtCell) {
      updatedAtCell.innerHTML = formatDateTimeHTML(new Date());
    }
  }

  function saveConfig() {
    const duration = document.querySelector('input[name="duration"]:checked').value;
    const format = document.querySelector('input[name="format"]:checked').value;
    const submissions = document.querySelector('input[name="submissions"]:checked').value;
    const daysCount = parseInt(document.getElementById('configDaysCount').value, 10) || 1;
    const submissionsCount = parseInt(document.getElementById('configSubmissionsCount').value, 10) || 1;

    console.log('Config saved:', { duration, format, submissions, daysCount, submissionsCount });
    refreshTableColumns(duration, daysCount, submissions === 'has-submissions', submissionsCount);
    closeModal('configModal');
  }

  function importCSV() {
    alert('Import CSV functionality');
  }

  function exportCSV() {
    alert('Export CSV functionality');
  }

  // Show the "Number of days" field only when Multi-day is selected.
  document.querySelectorAll('input[name="duration"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.getElementById('configDaysField').style.display = this.value === 'multi-day' ? 'block' : 'none';
    });
  });

  // Show the "Number of submissions" field only when Deliverables = Has submissions.
  document.querySelectorAll('input[name="submissions"]').forEach(radio => {
    radio.addEventListener('change', function() {
      document.getElementById('configSubmissionsField').style.display = this.value === 'has-submissions' ? 'block' : 'none';
    });
  });

  /* Attendance tracker — Single-day is one checkbox column with a
     "select all". Multi-day is a connected segmented button group, one
     button per event day, inline in each row's own cell — clicking a
     button toggles that day's attendance for that person, and hovering
     shows the exact calendar date. No bulk/select-all here since the
     control is per-row, not per-column.

     Submissions is an independent column (Deliverables config), also a
     connected segmented button group, one button per task — hovering
     shows the task name/title. Attendance and Submissions are rebuilt
     together by refreshTableColumns() so column order stays stable no
     matter which config changes. */
  const PROGRAM_START_DATE = new Date(2026, 0, 5); // demo: Monday, Jan 5 2026

  function formatDayDate(dayIndex) {
    const d = new Date(PROGRAM_START_DATE);
    d.setDate(d.getDate() + dayIndex);
    return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
  }

  // Demo seed data for the Submissions column — 3 tasks by default.
  const SUBMISSION_TASKS = ['Week 1 Reflection', 'Midpoint Project', 'Final Submission'];

  function wireSelectAll(headerRow, rows, getChecked, setChecked) {
    const selectAll = headerRow.querySelector('.attendance-select-all');
    if (!selectAll) return;

    function refresh() {
      const states = Array.from(rows).map(getChecked);
      const allChecked = states.every(Boolean);
      const someChecked = states.some(Boolean);
      selectAll.checked = allChecked;
      selectAll.indeterminate = someChecked && !allChecked;
    }

    selectAll.addEventListener('change', function() {
      rows.forEach(row => setChecked(row, this.checked));
      refresh();
    });

    rows.forEach(row => {
      row.querySelector('.attendance-checkbox').addEventListener('change', refresh);
    });

    refresh();
  }

  function insertHeaderCell(headerRow, th) {
    const createdAtTh = headerRow.querySelector('.created-at-th');
    if (createdAtTh) {
      headerRow.insertBefore(th, createdAtTh);
    } else {
      const spacer = document.getElementById('scrollbarSpacer');
      headerRow.insertBefore(th, spacer);
    }
  }

  function insertBodyCell(row, td) {
    const createdAtTd = row.querySelector('.created-at-cell');
    if (createdAtTd) {
      row.insertBefore(td, createdAtTd);
    } else {
      row.appendChild(td);
    }
  }

  function renderAttendanceColumn(headerRow, rows, mode, daysCount) {
    const th = document.createElement('th');
    th.className = 'attendance-th';
    insertHeaderCell(headerRow, th);

    if (mode === 'multi-day') {
      th.textContent = 'Attendance';

      rows.forEach(row => {
        const rowId = row.dataset.rowId;
        const record = attendanceData[rowId];
        const td = document.createElement('td');
        td.className = 'attendance-td';

        const wrapper = document.createElement('div');
        wrapper.className = 'attendance-day-row';

        const label = document.createElement('span');
        label.className = 'attendance-day-row-label';
        label.textContent = 'Day';
        wrapper.appendChild(label);

        const group = document.createElement('div');
        group.className = 'attendance-day-group';

        for (let i = 0; i < daysCount; i++) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'attendance-day-btn';
          btn.textContent = String(i + 1);
          btn.dataset.tooltip = formatDayDate(i);
          if (record.days[i]) btn.classList.add('filled');

          btn.addEventListener('click', () => {
            record.days[i] = !record.days[i];
            btn.classList.toggle('filled', record.days[i]);
            updateRowTimestamp(row);
          });

          group.appendChild(btn);
        }

        wrapper.appendChild(group);
        td.appendChild(wrapper);
        insertBodyCell(row, td);
      });

    } else {
      // single-day
      th.innerHTML = '<label class="attendance-th-label"><input type="checkbox" class="checkbox attendance-select-all"> Attendance</label>';

      rows.forEach(row => {
        const rowId = row.dataset.rowId;
        const td = document.createElement('td');
        td.className = 'attendance-td';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.className = 'checkbox attendance-checkbox';
        input.checked = attendanceData[rowId].single;
        input.addEventListener('change', () => {
          attendanceData[rowId].single = input.checked;
          updateRowTimestamp(row);
        });
        td.appendChild(input);
        insertBodyCell(row, td);
      });

      wireSelectAll(headerRow, rows,
        row => attendanceData[row.dataset.rowId].single,
        (row, val) => {
          if (attendanceData[row.dataset.rowId].single !== val) {
            attendanceData[row.dataset.rowId].single = val;
            row.querySelector('.attendance-checkbox').checked = val;
            updateRowTimestamp(row);
          }
        });
    }
  }

  function taskLabel(i) {
    return SUBMISSION_TASKS[i] || ('Task ' + (i + 1));
  }

  function renderSubmissionsColumn(headerRow, rows, submissionsCount) {
    const th = document.createElement('th');
    th.className = 'submissions-th';
    th.textContent = 'Submissions';
    insertHeaderCell(headerRow, th);

    rows.forEach(row => {
      const rowId = row.dataset.rowId;
      const record = submissionsData[rowId];
      const td = document.createElement('td');
      td.className = 'submissions-td';

      const wrapper = document.createElement('div');
      wrapper.className = 'submission-row';

      const label = document.createElement('span');
      label.className = 'submission-row-label';
      label.textContent = 'Task';
      wrapper.appendChild(label);

      const group = document.createElement('div');
      group.className = 'submission-group';

      for (let i = 0; i < submissionsCount; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'submission-btn';
        btn.textContent = String(i + 1);
        btn.dataset.tooltip = taskLabel(i);
        if (record[i]) btn.classList.add('filled');

        btn.addEventListener('click', () => {
          record[i] = !record[i];
          btn.classList.toggle('filled', record[i]);
          updateRowTimestamp(row);
        });

        group.appendChild(btn);
      }

      wrapper.appendChild(group);
      td.appendChild(wrapper);
      insertBodyCell(row, td);
    });
  }

  function refreshTableColumns(duration, daysCount, hasSubmissions, submissionsCount) {
    const headerRow = document.getElementById('headRow');
    const rows = document.querySelectorAll('#signups-table tbody tr');

    headerRow.querySelectorAll('.attendance-th, .submissions-th').forEach(th => th.remove());
    rows.forEach(row => row.querySelectorAll('.attendance-td, .submissions-td').forEach(td => td.remove()));

    if (duration !== 'no-attendance') {
      renderAttendanceColumn(headerRow, rows, duration, daysCount);
    }
    if (hasSubmissions) renderSubmissionsColumn(headerRow, rows, submissionsCount);

    syncHeaderWidths();
  }

  // The header table has no data of its own, so its column widths are
  // copied from the body table's actual rendered cells after every
  // render. A trailing spacer cell reserves the exact width the vertical
  // scrollbar takes from the body, so columns still line up.
  function syncHeaderWidths() {
    const headRow = document.getElementById('headRow');
    const spacer = document.getElementById('scrollbarSpacer');
    const scrollEl = document.querySelector('.table-scroll');
    const firstBodyRow = document.querySelector('#signups-table tbody tr:not(.hidden)');

    if (firstBodyRow) {
      const headCells = Array.from(headRow.children).filter(el => el !== spacer);
      const bodyCells = Array.from(firstBodyRow.children);
      headCells.forEach((th, i) => {
        if (bodyCells[i]) th.style.width = bodyCells[i].getBoundingClientRect().width + 'px';
      });
    }

    spacer.style.width = (scrollEl.offsetWidth - scrollEl.clientWidth) + 'px';
  }

  refreshTableColumns('multi-day', 7, true, 3);
  window.addEventListener('resize', syncHeaderWidths);

  /* Helper tooltips on the status pill + its dropdown options. */
  const STATUS_DESCRIPTIONS = {
    completed: 'Complete attendance and submissions',
    registered: 'Signup form response verified',
    interested: 'Clicked the register button',
    'dropped-out': 'Left the program before completion',
  };

  function applyStatusTooltips() {
    document.querySelectorAll('.status-pill.editable').forEach(pill => {
      pill.dataset.tooltip = STATUS_DESCRIPTIONS[pill.dataset.status] || '';
    });
    document.querySelectorAll('.status-option').forEach(opt => {
      opt.dataset.tooltip = STATUS_DESCRIPTIONS[opt.dataset.status] || '';
    });
  }

  applyStatusTooltips();

  // Runs after admin-common.js's own delegated handler has already updated
  // the pill's data-status for this same click, so the tooltip stays in sync.
  document.addEventListener('click', function(e) {
    const opt = e.target.closest('.status-option');
    if (opt) {
      applyStatusTooltips();
      const row = opt.closest('tr');
      if (row) {
        const pill = row.querySelector('.status-pill');
        if (pill) {
          row.dataset.status = pill.dataset.status;
        }
        updateRowTimestamp(row);
        applyFilter();
      }
    }
  });

  /* Dynamic custom tooltip to prevent clipping by overflow: auto container */
  const tooltipEl = document.createElement('div');
  tooltipEl.className = 'custom-tooltip';
  document.body.appendChild(tooltipEl);

  let activeTooltipTarget = null;

  function positionTooltip(target) {
    const rect = target.getBoundingClientRect();
    const tooltipRect = tooltipEl.getBoundingClientRect();

    if (target.classList.contains('status-option')) {
      // Side tooltip
      const top = rect.top + (rect.height - tooltipRect.height) / 2;
      const left = rect.right + 6;
      tooltipEl.style.top = top + 'px';
      tooltipEl.style.left = left + 'px';
    } else {
      // Top tooltip
      const top = rect.top - tooltipRect.height - 6;
      const left = rect.left + (rect.width - tooltipRect.width) / 2;
      tooltipEl.style.top = top + 'px';
      tooltipEl.style.left = left + 'px';
    }
  }

  function hideTooltip() {
    tooltipEl.classList.remove('show');
    activeTooltipTarget = null;
  }

  document.addEventListener('mouseover', function(e) {
    const target = e.target.closest('[data-tooltip]');
    if (!target) return;

    // Suppress tooltip if it's a status pill and its dropdown is open
    if (target.classList.contains('status-pill') && target.querySelector('.status-dropdown.show')) {
      hideTooltip();
      return;
    }

    activeTooltipTarget = target;
    tooltipEl.textContent = target.dataset.tooltip;
    tooltipEl.classList.add('show');
    positionTooltip(target);
  });

  document.addEventListener('mouseout', function(e) {
    if (activeTooltipTarget && !e.target.closest('[data-tooltip]')) {
      hideTooltip();
    }
  });

  // Hide or reposition tooltip on scroll inside the table body
  const tableScroll = document.querySelector('.table-scroll');
  if (tableScroll) {
    tableScroll.addEventListener('scroll', () => {
      if (activeTooltipTarget) {
        const rect = activeTooltipTarget.getBoundingClientRect();
        const scrollRect = tableScroll.getBoundingClientRect();
        // If the hovered element is scrolled out of the visible area of table-scroll, hide the tooltip
        if (rect.bottom < scrollRect.top || rect.top > scrollRect.bottom) {
          hideTooltip();
        } else {
          positionTooltip(activeTooltipTarget);
        }
      }
    });
  }

  window.addEventListener('resize', hideTooltip);

  /* Bulk row selection + footer counts. */
  const selectAllRows = document.getElementById('selectAllRows');
  const footerText = document.getElementById('footerText');

  function rowCheckboxes() {
    return Array.from(document.querySelectorAll('#signups-table tbody tr:not(.hidden) .row-select'));
  }

  function updateSelectionUI() {
    const boxes = rowCheckboxes();
    const total = boxes.length;
    const selectedCount = boxes.filter(cb => cb.checked).length;

    selectAllRows.checked = total > 0 && selectedCount === total;
    selectAllRows.indeterminate = selectedCount > 0 && selectedCount < total;

    if (selectedCount > 0) {
      footerText.innerHTML = '<span class="footer-selected-count">' + selectedCount + ' selected</span> of ' + total + ' rows';
    } else {
      footerText.textContent = total + ' rows';
    }
  }

  selectAllRows.addEventListener('change', function() {
    rowCheckboxes().forEach(cb => { cb.checked = this.checked; });
    updateSelectionUI();
  });

  document.querySelectorAll('#signups-table tbody .row-select').forEach(cb => cb.addEventListener('change', updateSelectionUI));

  updateSelectionUI();

  function applyFilter() {
    const filterVal = document.getElementById('statusFilter').value;
    const rows = document.querySelectorAll('#signups-table tbody tr');

    rows.forEach(row => {
      const pill = row.querySelector('.status-pill');
      const status = pill ? pill.dataset.status : '';
      if (filterVal === 'all' || status === filterVal) {
        row.classList.remove('hidden');
      } else {
        row.classList.add('hidden');
      }
    });

    updateSelectionUI();
    syncHeaderWidths();
  }

  document.getElementById('statusFilter').addEventListener('change', applyFilter);

  // Clicking anywhere on a row toggles its selection, except the checkbox
  // itself (already toggles natively), the Name/email column (needs normal
  // text selection for copying), and any interactive control within the
  // row (status pill/dropdown, attendance/submission buttons) — those
  // should only do their own thing, not also flip row selection.
  document.querySelectorAll('#signups-table tbody tr').forEach(row => {
    row.addEventListener('click', function(e) {
      const excluded = e.target.closest(
        '.row-select, .participant-name, .participant-email, .status-pill, .attendance-day-btn, .submission-btn, .attendance-checkbox, .created-at-cell, .updated-at-cell'
      );
      if (excluded) return;

      const checkbox = row.querySelector('.row-select');
      checkbox.checked = !checkbox.checked;
      checkbox.dispatchEvent(new Event('change'));
    });
  });
</script>

</body>
</html>
